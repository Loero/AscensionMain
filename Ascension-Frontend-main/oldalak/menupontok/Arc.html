<!DOCTYPE html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <title>Ascension – Arc</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../assets/css/main_style.css" />
    <link rel="stylesheet" href="../../assets/css/dashboard_style.css" />
  </head>
  <body>
    <header class="dashboard-header">
        <div class="header-left">
        </div>
        
        <button class="hamburger-menu" id="hamburger-menu" aria-label="Menü">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </header>

    <!-- Mobile Navigation Menu -->
    <nav class="mobile-nav" id="mobile-nav">
        <div class="nav-content">
            <button class="nav-close" id="nav-close" aria-label="Bezárás">&times;</button>
            
            <div class="nav-section">
                <h3>Fejlesztési Területek</h3>
                <ul class="nav-links">
                    <li><a href="./Test.html" class="nav-link">
                        <span class="nav-icon">💪</span>
                        <span class="nav-text">Test</span>
                    </a></li>
                    <li><a href="./Arc.html" class="nav-link">
                        <span class="nav-icon">👤</span>
                        <span class="nav-text">Arc</span>
                    </a></li>
                    <li><a href="./Mental.html" class="nav-link">
                        <span class="nav-icon">🧠</span>
                        <span class="nav-text">Mentál</span>
                    </a></li>
                </ul>
            </div>
            
            <div class="nav-section">
                <h3>Fiók</h3>
                <ul class="nav-links">
                    <li><a href="#" class="nav-link" id="profile-btn">
                        <span class="nav-icon">👤</span>
                        <span class="nav-text">Profilom</span>
                    </a></li>
                    <li><a href="../../oldalak/main.html" class="nav-link">
                        <span class="nav-icon">🏠</span>
                        <span class="nav-text">Főoldal</span>
                    </a></li>
                    <li><a href="#" class="nav-link" id="logout-btn">
                        <span class="nav-icon">🚪</span>
                        <span class="nav-text">Kijelentkezés</span>
                    </a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="mainwindow-content">
      <h2>Arc</h2>
      <p>
        Az arcod az első benyomás.<br />
        Optimalizáld.
      </p>
    </main>

    <section class="core-section" id="face-upload-section">
      <h3>🤳 Arc feltöltése és AI elemzés</h3>

      <form id="faceUploadForm">
        <input type="file" id="faceImage" accept="image/*" required />
        <br /><br />

        <img
          id="facePreview"
          style="display: none; max-width: 200px; margin-bottom: 10px"
        />

        <br />
        <button type="submit">AI elemzés indítása</button>
      </form>      <div id="aiResult" style="display: none; margin-top: 15px"></div>
    </section>
    
    <!-- Vissza a főoldalra gomb -->
    <div class="back-to-home">
      <a href="../main.html" class="btn-back-home">← Vissza a főoldalra</a>
    </div>

    <!-- Bejelentkezés/Regisztráció Modal -->
    <div id="auth-modal" class="auth-modal">
      <div class="auth-modal-content">
        <button class="auth-close" aria-label="Bezárás">&times;</button>
        
        <!-- Tab váltó gombok -->
        <div class="auth-tabs">
          <button class="auth-tab active" data-tab="login">Bejelentkezés</button>
          <button class="auth-tab" data-tab="register">Regisztráció</button>
        </div>

        <!-- Bejelentkezési form -->
        <form id="login-form" class="auth-form active">
          <h2>Bejelentkezés</h2>
          <div class="form-group">
            <label for="login-email">E-mail vagy felhasználónév</label>
            <input type="text" id="login-email" name="email" required />
          </div>
          <div class="form-group">
            <label for="login-password">Jelszó</label>
            <input type="password" id="login-password" name="password" required />
          </div>
          <button type="submit" class="btn-auth">Belépés</button>
        </form>

        <!-- Regisztrációs form -->
        <form id="register-form" class="auth-form">
          <h2>Regisztráció</h2>
          <div class="form-group">
            <label for="register-username">Felhasználónév</label>
            <input type="text" id="register-username" name="username" required />
          </div>
          <div class="form-group">
            <label for="register-email">E-mail cím</label>
            <input type="email" id="register-email" name="email" required />
          </div>
          <div class="form-group">
            <label for="register-password">Jelszó</label>
            <input type="password" id="register-password" name="password" required />
          </div>          <div class="form-group">
            <label for="register-password-confirm">Jelszó megerősítése</label>
            <input type="password" id="register-password-confirm" name="password-confirm" required />
          </div>
          <button type="submit" class="btn-auth">Regisztráció</button>
        </form>
      </div>
    </div>

    <!-- Profil Modal -->
    <div id="profile-modal" class="auth-modal">
      <div class="auth-modal-content profile-modal-content">
        <button class="auth-close profile-close" aria-label="Bezárás">&times;</button>
        
        <h2 style="text-align: center; margin-bottom: 30px; font-family: 'Cinzel', serif; color: #f5f5f5;">Profilom</h2>
        
        <div id="profile-content">
          <!-- Ide kerül a dinamikusan generált profil tartalom -->
          <div style="text-align: center; padding: 40px; color: #bdbdbd;">
            <p>Profil betöltése...</p>
          </div>
        </div>
        
        <button id="logout-btn" class="logout-btn">Kijelentkezés</button>
      </div>
    </div>

    <script src="../../assets/js/script.js"></script>
    <script src="../../assets/js/auth.js"></script>
    <script src="../../assets/js/dashboard.js"></script>
  </body>
</html>
